<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient like the reference -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#111111"/>
    </radialGradient>
    <!-- Metallic gold — bright band in the middle like the reference -->
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C49A2C"/>
      <stop offset="25%" stop-color="#D4AA38"/>
      <stop offset="42%" stop-color="#F0D060"/>
      <stop offset="50%" stop-color="#FFF0A0"/>
      <stop offset="58%" stop-color="#F0D060"/>
      <stop offset="75%" stop-color="#C49A2C"/>
      <stop offset="100%" stop-color="#9A7818"/>
    </linearGradient>
  </defs>

  <!-- Dark gradient background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- T4T monogram — thick bold strokes -->
  <g transform="translate(190, 230)">
    <!-- Top bar of the table -->
    <rect x="95" y="0" width="510" height="65" rx="32" fill="url(#metal)"/>
    <!-- Left leg -->
    <rect x="155" y="55" width="65" height="380" rx="8" fill="url(#metal)"/>
    <!-- Right leg -->
    <rect x="480" y="55" width="65" height="380" rx="8" fill="url(#metal)"/>
    <!-- 4 crossbar (horizontal) -->
    <rect x="220" y="240" width="260" height="50" rx="6" fill="url(#metal)"/>
    <!-- 4 vertical stroke -->
    <rect x="400" y="100" width="50" height="250" rx="6" fill="url(#metal)"/>
  </g>

  <!-- TABLE FOR TWO text -->
  <text x="540" y="780" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="700" fill="url(#metal)" letter-spacing="8">TABLE FOR TWO</text>
</svg>
